name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint · Build · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run lint
        name: Lint (Biome + TypeScript)

      - run: npm run build
        name: Build

      - run: npm run test
        name: Test

      - run: npm run test:coverage
        name: Coverage (90% threshold)
