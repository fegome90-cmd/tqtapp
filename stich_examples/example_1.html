<span class="material-symbols-outlined text-white text-sm">smart_toy</span>
</div>

</div>
</div>
<div class="w-full mt-4 flex flex-col gap-3">

<div class="w-14 h-14 bg-error-container/40 rounded-2xl flex items-center justify-center shrink-0 group-hover:scale-110 transition-transform">

</div>

<span class="material-symbols-outlined text-3xl text-primary-container filled-icon">widgets</span>
</div>
<div class="text-left">
<p class="font-black text-lg text-on-surface">Otras Necesidades</p>

</div>
</button>
</div>
</section>

<button type="button" class="w-full py-5 px-8 rounded-3xl flex flex-col items-center justify-center gap-2 active:scale-95 transition-all bg-[#014389] shadow-[0_20px_40px_-12px_rgba(1,67,137,0.4)] text-white group">
<div class="w-16 h-16 bg-white/10 rounded-full flex items-center justify-center mb-1 group-hover:bg-white/20 transition-colors">
<span class="material-symbols-outlined text-4xl filled-icon">notifications_active</span>
</div>
<span class="font-black text-2xl tracking-tight">Llamado de Asistencia</span>
<span class="text-white/70 text-xs font-bold uppercase tracking-widest">Enfermería te responderá pronto</span>
</button>
</div>
</section>
</main>
<div class="fixed bottom-6 left-6 right-6 z-50">

<a class="flex flex-col items-center justify-center text-outline-variant px-5 py-2 hover:text-primary transition-colors" href="#">
